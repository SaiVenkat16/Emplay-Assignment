version: '3.9'

services:

  # ─── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:14-alpine
    container_name: emplay_postgres
    environment:
      POSTGRES_DB: emplay_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - emplay_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: emplay_redis
    ports:
      - "6379:6379"
    networks:
      - emplay_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend (Node.js + Express) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emplay_backend
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: emplay_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emplay_network

  # ─── Frontend (React + Vite) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emplay_frontend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_BACKEND_URL: http://backend:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - emplay_network

# ─── Volumes & Networks ────────────────────────────────────
volumes:
  postgres_data:

networks:
  emplay_network:
    driver: bridge
